name: finetune_1S2_cpu

model_type: SRModel
scale: 4
num_gpu: 0   # 🔥 CPU

# -------------------------
# DATASET
# -------------------------
datasets:
  train:
    name: custom_train
    type: S2NAIPDataset

    dataroot_gt: ground_truth

    phase: train
    scale: 4

    use_shuffle: true
    batch_size_per_gpu: 2   # 🔥 klein houden
    num_worker_per_gpu: 0

# -------------------------
# MODEL (LICHTER)
# -------------------------
network_g:
  type: SSR_RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 32        # 🔥 kleiner (sneller)
  num_block: 10       # 🔥 minder blocks
  num_grow_ch: 16

# -------------------------
# TRAINING
# -------------------------
train:
  optim_g:
    type: Adam
    lr: 0.0002   # iets hoger → sneller leren

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0

  scheduler:
    type: MultiStepLR
    milestones: [500, 1000]
    gamma: 0.5

  total_iter: 1500   # 🔥 korter
  warmup_iter: 0

# -------------------------
# PATHS
# -------------------------
path:
  pretrain_network_g: null
  strict_load_g: true

  experiments_root: experiments
  models: experiments/models
  training_states: experiments/states
  log: experiments/log

# -------------------------
# LOGGING
# -------------------------
logger:
  print_freq: 20
  save_checkpoint_freq: 300
  use_tb_logger: false

# -------------------------
# VALIDATION
# -------------------------
val:
  val_freq: 300
  save_img: true
  suffix: null
  metrics: null